# generous_30ep.yaml — Extended training of generous-sweep-5 (best Turn3=0.700)
# From second sweep (us7ulxtv): lr=5.44e-5, drop=0.17, mv_w=1.0, sw_w=0.7
# Changes: 30 epochs (up from 15), cosine LR, TP head enabled (detached)

# ===== Training =====
learning_rate: 5.44e-5
optimizer: AdamW
num_epochs: 30
lr_schedule: cosine
embedder_feature_set: full
battle_format: gen9vgc2023regc

# ===== DataLoader =====
worker_batch_size: 128
num_workers: 3
prefetch_factor: 2
files_per_worker: 3
persistent_workers: true

# ===== Regularization =====
batch_size: 128
dropout: 0.17
weight_decay: 9.86e-5
max_grad_norm: 1.0
teampreview_head_dropout: 0.15

# ===== Loss Weights =====
teampreview_loss_weight: 1.0
turn_loss_weight: 1.0
win_loss_weight: 0.35
keep_force_switch: false
entropy_weight: 0.0

# ===== Loss Function =====
turn_loss_type: topk
train_topk_k: 2025
focal_alpha: 0.25

# ===== Action Type Weighting =====
move_loss_weight: 1.0
switch_loss_weight: 0.7

# ===== Architecture - Backbone =====
max_seq_len: 40
grouped_encoder_hidden_dim: 512
grouped_encoder_aggregated_dim: 4096
pokemon_attention_heads: 16
early_layers: [2048, 1024, 1024]

# ===== Architecture - Transformer =====
transformer_layers: 7
transformer_heads: 16
transformer_ff_dim: 2048
transformer_dropout: 0.1
use_decision_tokens: true
use_causal_mask: true
late_layers: [1024, 1024]

# ===== Architecture - Teampreview Head =====
teampreview_head_layers: [512, 256]
teampreview_attention_heads: 2

# ===== Architecture - Turn Action Head =====
turn_head_layers: [1024, 512, 512]

# ===== Distributional Value Head (C51) =====
num_value_bins: 51
value_min: -1.0
value_max: 1.0

# ===== Other =====
save_path: data/models/supervised/
seed: 21
