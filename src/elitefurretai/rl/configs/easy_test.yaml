# ===== Training hyperparameters =====
train_batch_size: 128  # Trajectories to collect before training update (lower = faster iteration)
max_updates: 100000
lr: 0.00003
rnad_alpha: 0.25
gamma: 0.999
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.02
vf_coef: 0.5
max_grad_norm: 0.5

# ===== Opponent Pool (Curriculum --> Portfolio) =====
curriculum:
  self_play: 0.25
  bc_player: 0.4
  exploiters: 0.0
  ghosts: 0
  max_damage: 0.35
adaptive_curriculum: false
train_exploiters: false
exploiter_registry_path: data/models/exploiter_registry.json
use_portfolio_regularization: true
portfolio_add_interval: 50
portfolio_update_strategy: recent
max_portfolio_size: 5
max_past_models: 5  # TODO: figure out how this is different from max_portfolio_size and if we need both

# ===== Team configurations =====
battle_format: gen9vgc2023regc
base_team_path: data/teams  # Where to find teams
team_pool_path: straightforward  # Assumes there are subdirectories after format directories in base_team_path

# ===== Model paths =====
# Initialize from supervised learning model (dauntless-hill-95 is the latest)
initialize_path: data/models/supervised/dauntless-hill-95.pt
bc_teampreview_path: data/models/supervised/dauntless-hill-95.pt
bc_action_path: data/models/supervised/dauntless-hill-95.pt
bc_win_path: data/models/supervised/dauntless-hill-95.pt
resume_from: null

# ===== Performance configuration =====
num_players: 12  # Total concurrent battle players
num_workers: 5  # Worker processes for parallel data collection
num_servers: 5  # Pokemon Showdown servers (1:1 with workers is optimal)
num_battles_per_pair: 32  # Battles each worker plays per opponent per loop
batch_size: 4  # Batch size for inference (kept small for low latency)
batch_timeout: 0.005  # Max wait time (s) before sending incomplete batch for inference
use_mixed_precision: true
max_battle_steps: 30  # Maximum steps per battle before forfeiting (prevents memory explosion from stuck battles)

# ===== Checkpointing =====
checkpoint_interval: 25 # also updates curriculum and adds to past models
ref_update_interval: 25
save_dir: data/models/rl
past_models_dir: data/models/rl/past_versions

# ===== Logging =====
use_wandb: true
wandb_project: elitefurretai-rnad
wandb_run_name: null  # Auto-generated
log_interval: 1

# ===== Hardware configuration =====
device: cuda
showdown_start_port: 8000

