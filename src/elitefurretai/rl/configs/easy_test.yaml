# Model paths
bc_action_path: data/models/supervised/magic-resonance-88.pt
bc_teampreview_path: data/models/supervised/magic-resonance-88.pt
bc_win_path: data/models/supervised/magic-resonance-88.pt
resume_from: null

# Team configurations
base_team_path: data/teams
battle_format: gen9vgc2023regc
team_pool_path: straightforward
use_random_teams: true

# Training hyperparameters
# NOTE: RAM was bottleneck at 4 workers (23.5/24GB). Reduced to 2 workers.
# BCPlayer model caching added to opponent_pool.py - saves ~500MB per BC opponent
# See OPTIMIZATIONS.md for performance tuning history
# Server parameters
num_showdown_servers: 2
max_players_per_server: 2    # Empirically optimal cap from OPTIMIZATIONS.md Session 4
showdown_start_port: 8000
num_workers: 2               # Reduced from 4 to lower RAM usage
players_per_worker: 2        # 2 pairs per worker = 4 concurrent total
batch_size: 8  # Max batch size for inference


# Hyperparameters tuned for stability (policy loss was exploding before)
lr: 0.00001              # Reduced from 0.00005 - prevents gradient explosion
train_batch_size: 64     # Reduced from 128 - lower memory, more frequent updates
max_updates: 100000
rnad_alpha: 0.02         # Increased from 0.01 - stronger regularization prevents drift
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.05
ent_coef: 0.0005         # Reduced from 0.001 - less exploration noise
vf_coef: 0.5
device: cuda

# Portfolio regularization
use_portfolio_regularization: false
max_portfolio_size: 5
portfolio_update_strategy: diverse
portfolio_add_interval: 5000

# Mixed Precision Training
use_mixed_precision: true
max_grad_norm: 0.5  # Maximum gradient norm for clipping (prevents exploding gradients)

# Checkpointing
initialize_path: data/models/supervised/magic-resonance-88.pt 
checkpoint_interval: 1000
max_past_models: 10
ref_update_interval: 1000
past_models_dir: data/models/rl/past_versions
save_dir: data/models/rl

# Opponent Pool Configuration
# Training with diverse curriculum - should naturally beat MaxBasePowerPlayer
curriculum:
  bc_player: 0.2
  exploiters: 0.2
  ghosts: 0.2
  self_play: 0.4
  max_damage: 0.0
curriculum_update_interval: 500
exploiter_registry_path: data/models/exploiter_registry.json

# Exploiter Training
train_exploiters: false
exploiter_ent_coef: 0.02
exploiter_eval_games: 100
exploiter_interval: 10000
exploiter_lr: 0.0001
exploiter_min_win_rate: 0.55
exploiter_output_dir: data/models/exploiters
exploiter_team_pool_path: null
exploiter_updates: 50000

# Logging
use_wandb: true
log_interval: 1
wandb_project: elitefurretai-rnad
wandb_run_name: null
wandb_tags: 
  - test